<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Inversiones</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f0f;color:#e8e6e3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center}
.loader{padding:2rem}
.loader h1{font-size:1.5rem;margin-bottom:1rem;color:#60a5fa}
.loader p{color:#888;font-size:0.9rem}
.spinner{width:40px;height:40px;border:3px solid #333;border-top-color:#60a5fa;border-radius:50%;animation:spin 1s linear infinite;margin:1.5rem auto}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="loader">
<h1>📊 Inversiones App</h1>
<div class="spinner"></div>
<p>Configurando deploy...<br>La app completa se sube en el próximo paso.</p>
</div>
</body>
</html>
